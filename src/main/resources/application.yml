server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: swift-middleware
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:swift_middleware}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    time-zone: UTC
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.bank.swift.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.bank.swift: ${LOG_LEVEL:INFO}
    org.springframework.amqp: INFO

# 自定义配置
swift:
  gateway:
    saa:
      port: ${SAA_PORT:8081}
    amh:
      port: ${AMH_PORT:8082}
  notification:
    http:
      connect-timeout-ms: ${HTTP_CONNECT_TIMEOUT:5000}
      read-timeout-ms: ${HTTP_READ_TIMEOUT:10000}
      max-retry: ${HTTP_MAX_RETRY:3}
    mq:
      exchange: swift.message.exchange
      queues:
        raw: swift.message.raw
        parsed: swift.message.parsed
        notified: swift.message.notified
      routing-keys:
        raw: swift.raw
        parsed: swift.parsed
        notified: swift.notified
